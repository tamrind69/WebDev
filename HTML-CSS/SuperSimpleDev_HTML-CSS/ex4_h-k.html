<style>
    .page-link {
        margin-left: 4px;
        margin-right: 4px;
    }

    .back {
        padding-top: 8px;
        padding-bottom: 8px;
        margin-right: 10px;
    }

    .next {
        padding-top: 8px;
        padding-bottom: 8px;
        margin-left: 10px;
    }

    .pagination{
        margin-bottom: 10px;
    }

    ._2stretch{
        height : 55px;
    }

    .stretch {
        border: none;
        background-color: green;
        color : white;
        padding-top: 8px;
        padding-bottom: 8px;
        transition: padding-top 0.2s, padding-bottom 0.2s, padding-left 0.2s, padding-right 0.2s;
        cursor: pointer;
    }

    .stretch:hover {
        padding-top: 16px;
        padding-bottom: 16px;
        padding-left :32px;
        padding-right :32px;
    }

    ._3D{
        height : 55px;
    }
    .shadow{
        padding : 8px;
        color:white;
        background-color: green;
        border: none;
        box-shadow: 2px 2px 4px 1px gray;
        cursor: pointer;
    }

    .shadow:active{
        margin-top: 2px;
        margin-left: 2px;
        box-shadow: 0px 0px 0px 0px gray;
    }

    .margin_padding{
        margin-top: 15px;
        width: 300px;
    }

    .margin{
        padding : 8px;
        color:white;
        background-color: green;
        border: none;
        padding-left: 8px;
        padding-right: 8px;
        margin-right: 10px;
        margin-left: 10px;
        cursor: pointer;
        transition: padding-left 0.2s, padding-right 0.2s , margin-left 0.2s , margin-right 0.2s;
    }
    .margin:hover{
        padding-left :16px;
        padding-right :16px;
        margin-right: 2px;
        margin-left: 2px;
    }
</style>

<div class="pagination">
    <button class="back">

    <a class="page-link" href="www.google.com">

    </a>
    <a class="page-link" href="www.google.com">
        3
    </a>
    <a class="page-link" href="www.google.com">
        4
    </a>
    <a class="page-link" href="www.google.com">
        5
    </a>
    <button class="next">
        Next
    </button>
</div>

<div class = "_2stretch">
    <button class = "stretch">
        Stretch
    </button>
</div>

<div class = "_3D">
    <button class = "shadow">
        Shadow
    </button>
</div>

<div class = "margin_padding">
    <button class = "margin">
        One
    </button>
    <button class = "margin">

    <button class = "margin">

    </button>
</div>
